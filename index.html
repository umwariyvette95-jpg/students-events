<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>School Events Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Nunito', sans-serif; }
  </style>
</head>

<body class="bg-slate-100 text-gray-800 min-h-screen">

  
  <nav class="bg-blue-600 sticky top-0 z-10 shadow-md">
    <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center gap-4">

      <div class="text-white text-2xl font-extrabold tracking-tight">
        🎓 School Events
      </div>

      <input
        type="text"
        id="search-input"
        placeholder="Search events…"
        class="px-4 py-2 rounded-full bg-white/20 text-white placeholder-white/70 outline-none focus:bg-white/30 w-64 text-sm font-semibold"
      />

    </div>
  </nav>


  <section class="max-w-6xl mx-auto px-6 mt-8">
  
  <div class="bg-white rounded-2xl shadow p-8">

    <h1 class="text-3xl md:text-4xl font-extrabold text-blue-600 mb-3">
        Dashboard Overview .2026
    </h1>

    <p class="text-gray-600 text-sm md:text-base leading-relaxed">
      A simple system to manage and track school events, registrations, and available seats.
    </p>

  </div>
  <section class="max-w-6xl mx-auto mt-9 px-5 grid grid-cols-1 md:grid-cols-3 gap-4">

    <!-- Total Events -->
    <div class="bg-white rounded-2xl shadow p-6 flex items-center gap-4">
      <div class="w-13 h-13 bg-blue-100 rounded-xl flex items-center justify-center text-2xl p-3">📅</div>
      <div>
        <p class="text-sm text-gray-400 font-semibold mb-1">Total Events</p>
        <p id="stat-total" class="text-4xl font-extrabold text-blue-600">0</p>
      </div>
    </div>

    
    <div class="bg-white rounded-2xl shadow p-6 flex items-center gap-4">
      <div class="w-13 h-13 bg-indigo-100 rounded-xl flex items-center justify-center text-2xl p-3">👥</div>
      <div>
        <p class="text-sm text-gray-400 font-semibold mb-1">Students Registered</p>
        <p id="stat-registered" class="text-4xl font-extrabold text-indigo-500">0</p>
      </div>
    </div>

    <div class="bg-white rounded-2xl shadow p-6 flex items-center gap-4">
      <div class="w-13 h-13 bg-green-100 rounded-xl flex items-center justify-center text-2xl p-3">🪑</div>
      <div>
        <p class="text-sm text-gray-400 font-semibold mb-1">Seats Remaining</p>
        <p id="stat-seats" class="text-4xl font-extrabold text-green-500">0</p>
      </div>
    </div>

  </section>


  
  <section class="max-w-6xl mx-auto mt-10 px-5">

    <h2 class="text-2xl font-extrabold mb-5 tracking-tight">Upcoming Events</h2>

    <div
      id="events-container"
      class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5"
    ></div>

  </section>


 
  <section class="max-w-2xl mx-auto mt-12 mb-20 px-5">

    <div class="bg-white rounded-2xl shadow p-8">

      <h2 class="text-2xl font-extrabold mb-6 tracking-tight">➕ Add New Event</h2>

      <form id="add-event-form" class="space-y-5">

       
        <div>
          <label class="block text-sm font-bold mb-2">Event Title</label>
          <input
            type="text"
            id="event-title"
            placeholder="Enter title"
            class="w-full border-2 border-gray-200 focus:border-blue-500 rounded-xl px-4 py-3 outline-none text-sm transition-colors"
          />
        </div>

        
        <div>
          <label class="block text-sm font-bold mb-2">Category</label>
          <select
            id="event-category"
            class="w-full border-2 border-gray-200 focus:border-blue-500 rounded-xl px-4 py-3 outline-none text-sm transition-colors"
          >
            <option value="">Select Category</option>
            <option value="Technology">Technology</option>
            <option value="Sports">Sports</option>
            <option value="Health">Health</option>
            <option value="Science">Science</option>
            <option value="Arts">Arts</option>
          </select>
        </div>

        
        <div>
          <label class="block text-sm font-bold mb-2">Number of Seats</label>
          <input
            type="number"
            id="event-seats"
            placeholder="Enter seats"
            class="w-full border-2 border-gray-200 focus:border-blue-500 rounded-xl px-4 py-3 outline-none text-sm transition-colors"
          />
        </div>

       
        <div>
          <label class="block text-sm font-bold mb-2">Event Date</label>
          <input
            type="date"
            id="event-date"
            class="w-full border-2 border-gray-200 focus:border-blue-500 rounded-xl px-4 py-3 outline-none text-sm transition-colors"
          />
        </div>

        <button
          type="submit"
          class="bg-blue-600 hover:bg-blue-700 active:scale-95 text-white font-bold px-8 py-3 rounded-xl transition-all"
        >
         
        </button>

      </form>
    </div>

  </section>


  
  <script src="app.js"></script>

</body>
</html>
